services:
  postgres:
    image: postgres:16-alpine
    container_name: collins-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: collins_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - collins_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collins_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  collins_postgres_data:
